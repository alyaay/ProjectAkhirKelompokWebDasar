<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Titipin Laundry — Login</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css"
    />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <!-- HEADER -->
        <div class="login-card-header">
          <div class="brand-icon">🧺</div>
          <h1>Titipin Laundry</h1>
          <p>Smart Laundry Pickup & Delivery System</p>
        </div>

        <!-- BODY -->
        <div class="login-card-body">
          <!-- TAB GROUP -->
          <div class="tab-group">
            <button class="tab-btn active" onclick="switchTab('login')">
              <i class="ti ti-login"></i>
              Masuk
            </button>
            <button class="tab-btn" onclick="switchTab('register')">
              <i class="ti ti-user-plus"></i>
              Daftar
            </button>
          </div>

          <!-- TAB: LOGIN -->
          <div class="tab-panel active" id="tab-login">
            <form id="loginForm">
              <div class="field-group">
                <label class="field-label">Alamat Email</label>
                <div class="field-wrap">
                  <i class="ti ti-mail field-icon"></i>
                  <input type="email" id="email" placeholder="contoh@email.com" required />
                </div>
              </div>
              <div class="field-group">
                <label class="field-label">Kata Sandi</label>
                <div class="field-wrap">
                  <i class="ti ti-lock field-icon"></i>
                  <input type="password" id="password" placeholder="Masukkan kata sandi" required />
                </div>
              </div>
              <button type="submit" class="btn-full" style="margin-top: 6px">
                <i class="ti ti-login"></i>
                Masuk Sekarang
              </button>
            </form>
          </div>

          <!-- TAB: REGISTER -->
          <div class="tab-panel" id="tab-register">
            <form id="registerForm">
              <div class="field-group">
                <label class="field-label">Nama Lengkap</label>
                <div class="field-wrap">
                  <i class="ti ti-user field-icon"></i>
                  <input type="text" id="regNama" placeholder="Nama lengkap kamu" required />
                </div>
              </div>
              <div class="field-group">
                <label class="field-label">Alamat Email</label>
                <div class="field-wrap">
                  <i class="ti ti-mail field-icon"></i>
                  <input type="email" id="regEmail" placeholder="contoh@email.com" required />
                </div>
              </div>
              <div class="field-group">
                <label class="field-label">Kata Sandi</label>
                <div class="field-wrap">
                  <i class="ti ti-lock field-icon"></i>
                  <input
                    type="password"
                    id="regPassword"
                    placeholder="Minimal 6 karakter"
                    required
                  />
                </div>
              </div>
              <div class="field-group">
                <label class="field-label">Nomor HP</label>
                <div class="field-wrap">
                  <i class="ti ti-phone field-icon"></i>
                  <input type="tel" id="regHp" placeholder="08xxxxxxxxxx" required />
                </div>
              </div>
              <div class="field-group">
                <label class="field-label">Alamat Rumah / Kos</label>
                <div class="field-wrap">
                  <i class="ti ti-map-pin field-icon-top"></i>
                  <textarea
                    id="regAlamat"
                    placeholder="Tulis alamat lengkap kamu"
                    required
                  ></textarea>
                </div>
              </div>
              <button type="submit" class="btn-full" style="margin-top: 6px">
                <i class="ti ti-user-plus"></i>
                Buat Akun Sekarang
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
      <i class="ti ti-check"></i>
      <span id="toastMsg"></span>
    </div>

    <script src="js/main.js"></script>
    <script>
      function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach((b, i) => {
          b.classList.toggle(
            'active',
            (i === 0 && tab === 'login') || (i === 1 && tab === 'register')
          );
        });
        document.getElementById('tab-login').classList.toggle('active', tab === 'login');
        document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      }
    </script>
  </body>
</html>
